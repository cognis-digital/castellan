apiVersion: apps/v1
kind: Deployment
metadata: { name: castellan, labels: { app: castellan } }
spec:
  replicas: 1
  selector: { matchLabels: { app: castellan } }
  template:
    metadata: { labels: { app: castellan } }
    spec:
      containers:
        - name: castellan
          image: ghcr.io/cognis-digital/castellan:latest
          ports: [{ containerPort: 8000 }]
          resources:
            requests: { cpu: "50m", memory: "64Mi" }
            limits: { cpu: "500m", memory: "256Mi" }
---
apiVersion: v1
kind: Service
metadata: { name: castellan }
spec:
  selector: { app: castellan }
  ports: [{ port: 80, targetPort: 8000 }]
